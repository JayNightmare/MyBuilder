# Fine-tuning hyperparameters for MineHelper build generator.
# These are tuned for Qwen2.5-Coder-1.5B-Instruct with QLoRA.

model:
        base: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
        max_seq_length: 20000
        load_in_4bit: true

lora:
        r: 16
        lora_alpha: 32
        lora_dropout: 0.05
        target_modules:
                - "q_proj"
                - "k_proj"
                - "v_proj"
                - "o_proj"
                - "gate_proj"
                - "up_proj"
                - "down_proj"

training:
        num_epochs: 3
        per_device_batch_size: 2
        gradient_accumulation_steps: 4
        learning_rate: 2.0e-4
        lr_scheduler: "cosine"
        warmup_ratio: 0.05
        weight_decay: 0.01
        fp16: false
        bf16: true
        logging_steps: 10
        save_steps: 100

output:
        dir: "../models/minehelper-v1"
        push_to_hub: false
